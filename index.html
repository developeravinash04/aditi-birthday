<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Happy Birthday Aditi 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
text-align:center;
margin:0;
color:white;
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;

background: linear-gradient(
135deg,
#ff9a9e 0%,
#fecfef 40%,
#fad0c4 70%,
#ffd1ff 100%
);
}

/* TITLE */

h1{
font-size:64px;
margin-top:70px;
background:linear-gradient(90deg,#fff,#ffe6f2,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 6px 20px rgba(255,255,255,0.4);
}

/* COUNTDOWN */

#countdown{
font-size:28px;
margin-top:20px;
}

/* GIFT BOX */

#giftBox{
font-size:70px;
cursor:pointer;
margin-top:30px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* CENTER AREA */

#centerArea{
margin-top:20px;
}

/* BALLOONS */

.balloon{
font-size:50px;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

/* CAKE */

#cake{
font-size:90px;
margin-top:20px;
animation:bounce 2s infinite;
}

/* MESSAGE CARD */

#message{
display:none;
margin-top:40px;
margin-bottom:150px;
max-width:750px;
margin-left:auto;
margin-right:auto;

padding:30px;

border-radius:25px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);

box-shadow:
0 15px 40px rgba(0,0,0,0.15),
0 0 30px rgba(255,255,255,0.2);

font-size:20px;
line-height:1.7;
}

/* FOOTER */

footer{
margin-top:40px;
font-size:20px;
}

/* FLOATING ICONS */

.floating-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:-1;
}

.floating{
position:absolute;
animation:floatUp linear infinite;
opacity:0.8;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* MOBILE */

@media(max-width:600px){

h1{
font-size:40px;
}

#message{
font-size:18px;
padding:20px;
}

}

</style>

</head>

<body>

<div class="floating-container"></div>

<h1 id="title">🎉 Happy Birthday Aditi 🎉</h1>

<div id="countdown"></div>

<div id="centerArea">

<div id="giftBox" onclick="openGift()">
🎁
</div>

<div class="balloon">🎈 🎈 🎈 🧸</div>

<div id="cake">🎂</div>

</div>

<div id="message">

<p id="typing"></p>

</div>

<footer>

Love from,<br>
<b>Avinash & Sanskriti ❤️</b>

</footer>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c1d0a5e6f.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3">
</audio>

<script>

/* SPARKLES */

function createSparkle(){

const sparkle=document.createElement("div")

sparkle.innerHTML="✨"

sparkle.style.position="fixed"
sparkle.style.left=Math.random()*100+"vw"
sparkle.style.top=Math.random()*100+"vh"
sparkle.style.fontSize=(10+Math.random()*20)+"px"
sparkle.style.opacity=Math.random()

document.body.appendChild(sparkle)

setTimeout(()=>{sparkle.remove()},2000)

}

setInterval(createSparkle,300)

/* FLOATING ICONS */

const icons=["❤️","💖","💝","🧸","💕","💗"]

function createFloating(){

const element=document.createElement("div")
element.className="floating"

element.innerHTML=icons[Math.floor(Math.random()*icons.length)]

element.style.left=Math.random()*100+"vw"
element.style.animationDuration=6+Math.random()*6+"s"
element.style.fontSize=20+Math.random()*30+"px"

document.querySelector(".floating-container").appendChild(element)

setTimeout(()=>{element.remove()},12000)

}

setInterval(createFloating,500)

/* GIFT OPEN */

function openGift(){

document.getElementById("giftBox").innerHTML="🎉"

document.getElementById("message").style.display="block"

document.getElementById("music").play()

/* CONFETTI */

confetti({
particleCount:300,
spread:180,
origin:{y:0.6}
})

fireworks()

startTyping()

}

/* FIREWORKS */

function fireworks(){

var duration=3000
var end=Date.now()+duration

(function frame(){

confetti({
particleCount:5,
angle:60,
spread:70,
origin:{x:0}
})

confetti({
particleCount:5,
angle:120,
spread:70,
origin:{x:1}
})

if(Date.now()<end){
requestAnimationFrame(frame)
}

})()

}

/* TYPING MESSAGE */

const messageText=`Dear Aditi,

Wishing you a very Happy Birthday! 🎉

May your life always be filled with happiness, laughter,
and beautiful moments that make every day special.

May this year bring you amazing opportunities,
great achievements and endless success.

Keep shining and spreading positivity everywhere.

May your future be filled with love, success,
good health and countless joyful memories.

Once again, Happy Birthday and have a fantastic year ahead! 🎂✨`

function startTyping(){

let i=0
const speed=40

function type(){

if(i<messageText.length){

document.getElementById("typing").innerHTML+=messageText.charAt(i)

i++

setTimeout(type,speed)

}

}

type()

}

/* COUNTDOWN */

var birthday=new Date("March 24, 2026 00:00:00").getTime()

var x=setInterval(function(){

var now=new Date().getTime()

var distance=birthday-now

var days=Math.floor(distance/(1000*60*60*24))
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
var minutes=Math.floor((distance%(1000*60*60))/(1000*60))
var seconds=Math.floor((distance%(1000*60))/1000)

document.getElementById("countdown").innerHTML=
"⏳ Surprise unlocks in: "+days+"d "+hours+"h "+minutes+"m "+seconds+"s"

if(distance<0){

clearInterval(x)

document.getElementById("countdown").innerHTML="🎉 It's Aditi's Birthday Today! 🎉"

}

},1000)

</script>

</body>
</html>
