<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Celebration | Aditi 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

:root{
--gold:#d4af37;
--rose:#ffafbd;
--deep:#ff4081;
--glass:rgba(255,255,255,0.15);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:none;
}

body{
background:radial-gradient(circle,#2c001e 0%,#000 100%);
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
min-height:200vh;
}

/* cursor */

#cursor-dot{
width:8px;
height:8px;
background:white;
border-radius:50%;
position:fixed;
pointer-events:none;
z-index:9999;
box-shadow:0 0 15px white;
}

/* stars */

.stars-container{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle var(--duration) infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:0.3}
50%{opacity:1;box-shadow:0 0 10px white}
}

/* floating items */

.float-wrap{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.item{
position:absolute;
font-size:2rem;
animation:floatUp var(--d) linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(110vh)}
100%{transform:translateY(-20vh)}
}

/* hero */

.hero{
min-height:100vh;
padding-top:40px;
padding-bottom:40px;

display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
text-align:center;
}

/* title */

.main-title{
font-family:'Great Vibes',cursive;
font-size:8rem;

background:linear-gradient(to right,#fdf5e6,#d4af37,#fdf5e6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

filter:drop-shadow(0 0 20px rgba(212,175,55,.6));
}

.bday-text{
letter-spacing:10px;
text-transform:uppercase;
color:var(--rose);
margin-bottom:30px;
}

/* CAKE */

.cake-container{
margin-top:30px;
margin-bottom:10px;

display:flex;
justify-content:center;
}
display:flex;
justify-content:center;
}

.cake-img{
width:220px;
max-width:70%;
height:auto;

animation:cakeBounce 2s infinite;

filter:drop-shadow(0 0 25px rgba(255,150,200,0.9));
}

@keyframes cakeBounce{

0%,100%{
transform:translateY(0)
}

50%{
transform:translateY(-10px)
}

}

.cake::before{
content:"";
position:absolute;
top:-20px;
left:0;

width:200px;
height:30px;

background:white;

border-radius:20px 20px 0 0;
}



/* candles */

.candle{
width:10px;
height:40px;
background:white;
position:absolute;
top:-40px;
border-radius:3px;
}

.c1{left:55px}
.c2{left:95px}
.c3{left:135px}

.flame{
width:14px;
height:18px;
background:orange;
border-radius:50%;
position:absolute;
top:-15px;
left:-2px;
animation:flicker .2s infinite;
box-shadow:0 0 15px orange;
}

@keyframes flicker{
0%,100%{transform:scale(1)}
50%{transform:scale(1.3)}
}

@keyframes cakeBounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

/* countdown */

#countdown{
background:var(--glass);
backdrop-filter:blur(10px);
padding:20px 40px;
border-radius:100px;
margin-top:30px;
}

/* gift button */

.reveal-btn{
margin-top:40px;
padding:20px 60px;
font-size:1.5rem;
font-family:'Playfair Display';
border:none;
border-radius:50px;
background:linear-gradient(45deg,#d4af37,#fdf5e6,#d4af37);
background-size:200%;
color:#2c001e;
font-weight:bold;
animation:shine 3s linear infinite;
}

@keyframes shine{
to{background-position:200% center}
}

/* card */

.card-container{
display:none;
max-width:900px;
margin:100px auto;
padding:70px;
background:white;
color:#333;
border-radius:5px;
box-shadow:0 30px 100px rgba(0,0,0,.8);
animation:slideUp 1s ease;
}

@keyframes slideUp{
from{opacity:0;transform:translateY(100px)}
to{opacity:1}
}

.letter-content{
font-size:1.2rem;
line-height:2;
text-align:center;
}

/* signature */

.signature{
font-family:'Great Vibes';
font-size:3rem;
color:var(--deep);
margin-top:40px;
}

.name-signature{
font-family:'Great Vibes';
font-size:2.8rem;
color:#ff4081;
margin-top:10px;
background:linear-gradient(45deg,#ff4081,#ff9ab3,#ff4081);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glowName 3s infinite alternate;
}

@keyframes glowName{
from{text-shadow:0 0 10px rgba(255,64,129,0.4)}
to{text-shadow:0 0 25px rgba(255,64,129,0.9)}
}

/* sparkle */

.sparkle{
position:fixed;
pointer-events:none;
font-size:14px;
animation:sparkleFade 2s linear forwards;
}

@keyframes sparkleFade{
0%{opacity:1}
100%{opacity:0;transform:scale(1.5)}
}

/* mobile */

@media(max-width:768px){
.main-title{font-size:4rem}
.card-container{margin:20px;padding:30px}
}

</style>

</head>

<body>

<div id="cursor-dot"></div>

<div class="stars-container" id="stars"></div>
<div class="float-wrap" id="floatWrap"></div>

<section class="hero">

<div class="bday-text">Our Dearest</div>

<h1 class="main-title">Aditi</h1>

<div class="cake-container">
<img 
src="https://media.tenor.com/1XmZK8fejbsAAAAi/sappy-seal.gif" 
class="cake-img"
alt="Cute Birthday Seal">
</div>

<div id="countdown">Preparing Surprise...</div>

<button class="reveal-btn" onclick="unfoldSurprise()">OPEN YOUR GIFT 🎁</button>

</section>

<div class="card-container" id="letterCard">

<div class="letter-content" id="typingText"></div>

<div class="signature">With endless love</div>
<div class="name-signature">Avinash & Sanskriti ❤️</div>

</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c1d0a5e6f.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3">
</audio>

<script>

/* stars */

for(let i=0;i<150;i++){
let s=document.createElement("div")
s.className="star"
let size=Math.random()*3+"px"
s.style.width=size
s.style.height=size
s.style.top=Math.random()*100+"%"
s.style.left=Math.random()*100+"%"
s.style.setProperty("--duration",Math.random()*3+2+"s")
document.getElementById("stars").appendChild(s)
}

/* cursor */

const dot=document.getElementById("cursor-dot")

window.addEventListener("mousemove",e=>{
dot.style.left=e.clientX+"px"
dot.style.top=e.clientY+"px"
})

/* floating items */

const items=["🧸","🎈","❤️","💖","🎂","🌸","⭐"]

function spawn(){
let el=document.createElement("div")
el.className="item"
el.innerHTML=items[Math.floor(Math.random()*items.length)]
el.style.left=Math.random()*100+"vw"
el.style.setProperty("--d",Math.random()*5+10+"s")
document.getElementById("floatWrap").appendChild(el)
setTimeout(()=>el.remove(),15000)
}

setInterval(spawn,800)

/* sparkle */

function sparkle(){
let s=document.createElement("div")
s.className="sparkle"
s.innerHTML="✨"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
setTimeout(()=>s.remove(),2000)
}

setInterval(sparkle,400)

/* countdown */

const bday=new Date("March 24, 2026 00:00:00").getTime()

setInterval(()=>{
let now=new Date().getTime()
let d=bday-now

let days=Math.floor(d/(1000*60*60*24))
let hours=Math.floor((d%(1000*60*60*24))/(1000*60*60))
let mins=Math.floor((d%(1000*60*60))/(1000*60))
let secs=Math.floor((d%(1000*60))/1000)

document.getElementById("countdown").innerHTML=
d>0?`Preparing Surprise: ${days}d ${hours}h ${mins}m ${secs}s`:"The Queen's Day Has Arrived!"

},1000)

/* typing */

const message=`Happy Birthday Aditi!

Today isn't just a date on the calendar — it is a celebration of the wonderful soul you are.

Your presence spreads warmth and happiness everywhere.

May your life be filled with joy, success, beautiful memories and endless smiles.

Keep shining like the star you are.

The world is brighter with you in it.`

function typeMessage(){
let i=0
const el=document.getElementById("typingText")

function type(){
if(i<message.length){
el.innerHTML+=message.charAt(i)
i++
setTimeout(type,40)
}
}

type()
}

/* reveal */

function unfoldSurprise(){

document.getElementById("letterCard").style.display="block"

document.getElementById("bgMusic").play()

confetti({
particleCount:300,
spread:180,
origin:{y:0.4},
colors:["#d4af37","#ff4081","#ffffff"]
})

typeMessage()

setTimeout(()=>{
document.getElementById("letterCard").scrollIntoView({behavior:"smooth"})
},500)

}

</script>

</body>
</html>
